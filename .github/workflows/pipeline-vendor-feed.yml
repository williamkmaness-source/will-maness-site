name: Vendor Feed Daily Pipeline
on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Run migration
        run: pnpm tsx scripts/migrate-vendor-feed.ts
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      - name: Run scraper
        run: pnpm tsx scripts/pipeline-vendor-feed.ts scrape
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      - name: Run extractor
        run: pnpm tsx scripts/pipeline-vendor-feed.ts extract
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
